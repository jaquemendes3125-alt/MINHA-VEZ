<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINHA-VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #F4EBD0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #9B0000;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        h1::before { content: "✦ "; }
        h1::after { content: " ✦"; }

        .topo-controles {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 4px;
            border: 2px solid #660000;
            cursor: pointer;
            font-weight: bold;
        }
        select { background-color: #FFE97F; color: #660000; }
        button { background-color: #9B0000; color: #FFE97F; border: none; }

        /* TABULEIRO SEM NENHUM SOMBREAMENTO, COMO UM QUADRO LIMPO */
        .tabuleiro {
            background-color: #9B0000;
            border: 6px solid #660000;
            border-radius: 12px;
            padding: 22px;
            box-shadow: none;
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 10px;
            margin-bottom: 20px;
        }

        .peca {
            background-color: #FFE97F;
            border: 3px solid #CC9900;
            border-radius: 6px;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            font-size: 34px;
            color: #000000;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
        }
        .peca.vazia {
            background-color: #9B0000;
            border: 3px dashed #FFE97F;
            cursor: default;
        }

        .lista-palavras {
            background-color: #E8DCC3;
            border: 3px solid #8B7355;
            border-radius: 8px;
            padding: 18px;
            width: 330px;
            text-align: center;
            margin-bottom: 18px;
            box-shadow: none;
        }
        .lista-palavras h3 {
            font-size: 18px;
            color: #660000;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .palavra {
            font-size: 19px;
            font-weight: bold;
            color: #660000;
            margin: 0 10px;
            display: inline-block;
        }
        .palavra.ok {
            text-decoration: line-through;
            color: #006600;
        }

        .botoes {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }
        .mensagem {
            font-size: 20px;
            font-weight: bold;
            color: #006600;
            min-height: 26px;
            text-align: center;
            margin-bottom: 15px;
        }

        .anuncio {
            width: 330px;
            height: 65px;
            background-color: #D4C7A9;
            border: 3px solid #8B7355;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #660000;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>MINHA-VEZ VINTAGE</h1>

    <div class="topo-controles">
        <select id="idioma" onchange="trocarIdioma()">
            <option value="pt">Português</option>
            <option value="en">Inglês</option>
            <option value="es">Espanhol</option>
        </select>
        <button id="botaoSom" onclick="alternarSom()">🔇 Som</button>
    </div>

    <div class="tabuleiro" id="tabuleiroJogo"></div>

    <div class="lista-palavras">
        <h3>Palavras para formar:</h3>
        <div id="listaPalavras"></div>
    </div>

    <div class="botoes">
        <button onclick="embaralharENovas()">🔄 Embaralhar & Novas Palavras</button>
        <button onclick="verificar()">✅ Verificar</button>
    </div>

    <div class="mensagem" id="aviso"></div>

    <div class="anuncio">✦ ESPAÇO PARA ANÚNCIOS ✦</div>

    <script>
        let somAtivo = false;
        let audioContexto;
        let espacoVazio = 15;
        let pecas = [];
        let palavrasRodada = [];
        let idiomaAtual = "pt";
        const TOTAL = 16;

        const BANCO = {
            pt: { res: "Encontradas {0} de 3 palavras!", lista: ["CASA", "FLOR", "BOLO", "LUZ", "MAR", "CÉU", "CHÃO", "FRIO", "ÁGUA", "SOL", "LUA", "RIO", "PAZ", "MÃE", "PAI", "VIDA", "DIA", "NOITE", "AZUL", "ROSA", "JOGO", "LIVRO", "MESA", "PORTA", "RUA", "GATO", "CÃO", "PEIXE", "SIM", "NÃO", "BOM", "RUIM", "VERDE", "FESTA"] },
            en: { res: "Found {0} of 3 words!", lista: ["TREE", "BALL", "HOME", "LOVE", "CAKE", "SEA", "SKY", "COLD", "HOT", "SUN", "MOON", "ROAD", "PEACE", "MOM", "DAD", "LIFE", "DAY", "NIGHT", "BLUE", "ROSE", "GAME", "BOOK", "TABLE", "DOOR", "CITY", "CAT", "DOG", "FISH", "YES", "NO", "NEW", "OLD", "BIG", "RED"] },
            es: { res: "Encontradas {0} de 3 palabras!", lista: ["CASA", "FLOR", "PAN", "LUZ", "MAR", "CIELO", "FRÍO", "CALOR", "AGUA", "SOL", "LUNA", "RÍO", "PAZ", "MAMÁ", "PAPÁ", "VIDA", "DÍA", "NOCHE", "AZUL", "ROSA", "JUEGO", "LIBRO", "MESA", "PUERTA", "CIUDAD", "GATO", "PERRO", "PEZ", "SÍ", "NO", "YA", "MAS", "PERO", "POR"] }
        };

        function tocarSom() {
            if(!audioContexto) audioContexto = new (window.AudioContext || window.webkitAudioContext)();
            const n = audioContexto.createOscillator();
            const v = audioContexto.createGain();
            n.connect(v); v.connect(audioContexto.destination);
            n.frequency.value = 520; n.type = "square"; v.gain.value = 0.1;
            n.start(); n.stop(audioContexto.currentTime + 0.15);
        }
        function alternarSom() {
            somAtivo = !somAtivo;
            document.getElementById("botaoSom").textContent = somAtivo ? "🔊 Som" : "🔇 Som";
        }
        function trocarIdioma() {
            idiomaAtual = document.getElementById("idioma").value;
            embaralharENovas();
        }
        function pegarPalavras() {
            let t = [...BANCO[idiomaAtual].lista], s = [];
            for(let i=0;i<3;i++) s.push(t.splice(Math.floor(Math.random()*t.length),1)[0]);
            return s;
        }
        function desenhar() {
            const tab = document.getElementById("tabuleiroJogo");
            tab.innerHTML = "";
            pecas.forEach((l,i)=>{
                const d = document.createElement("div");
                d.className = l==""?"peca vazia":"peca";
                d.textContent = l;
                d.onclick = ()=>mover(i);
                tab.appendChild(d);
            });
        }
        function mover(i) {
            const v = [espacoVazio-1, espacoVazio+1, espacoVazio-4, espacoVazio+4];
            if(!v.includes(i)) return;
            if(somAtivo) tocarSom();
            pecas[espacoVazio] = pecas[i]; pecas[i] = ""; espacoVazio = i;
            desenhar();
        }
        function mostrarPalavras() {
            const l = document.getElementById("listaPalavras"); l.innerHTML = "";
            palavrasRodada.forEach(p=>{
                const s = document.createElement("span");
                s.className = "palavra"; s.textContent = p; s.dataset.val = p;
                l.appendChild(s);
            });
        }
        function embaralharPecas() {
            for(let i=pecas.length-1;i>0;i--) {
                const j = Math.floor(Math.random()*(i+1));
                if(pecas[i]!="" && pecas[j]!="") [pecas[i], pecas[j]] = [pecas[j], pecas[i]];
            }
            espacoVazio = pecas.indexOf(""); desenhar();
        }
        function embaralharENovas() {
            palavrasRodada = pegarPalavras();
            pecas = []; palavrasRodada.forEach(p=>pecas.push(...p.split("")));
            const extras = "ABCDEFGHIJKLMNOPQRSTUVWXYZÁÉÍÓÚÂÊÔÃÕÇ";
            while(pecas.length < TOTAL-1) pecas.push(extras[Math.floor(Math.random()*extras.length)]);
            pecas.push(""); embaralharPecas(); mostrarPalavras();
            document.getElementById("aviso").textContent = "";
        }
        function verificar() {
            const lins = [pecas[0]+pecas[1]+pecas[2]+pecas[3], pecas[4]+pecas[5]+pecas[6]+pecas[7], pecas[8]+pecas[9]+pecas[10]+pecas[11], pecas[12]+pecas[13]+pecas[14]+pecas[15]];
            const cols = [pecas[0]+pecas[4]+pecas[8]+pecas[12], pecas[1]+pecas[5]+pecas[9]+pecas[13], pecas[2]+pecas[6]+pecas[10]+pecas[14], pecas[3]+pecas[7]+pecas[11]+pecas[15]];
            const todas = [...lins, ...cols, ...lins.map(x=>x.split("").reverse().join("")), ...cols.map(x=>x.split("").reverse().join(""))];
            let acertou = 0;
            palavrasRodada.forEach(p=>{
                if(todas.includes(p)) {
                    acertou++;
                    document.querySelector(`[data-val="${p}"]`).classList.add("ok");
                }
            });
            document.getElementById("aviso").textContent = BANCO[idiomaAtual].res.replace("{0}", acertou);
        }

        embaralharENovas();
    </script>

</body>
</html>
