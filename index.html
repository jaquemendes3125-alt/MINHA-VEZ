<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MINHA-VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Arial Black", Gadget, sans-serif; }
        html, body {
            background-color: #F4EBD0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .cabecalho {
            width: 310px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 22px;
            color: #9B1C1C;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            text-align: center;
            flex: 1;
        }
        .lado-direito {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .idioma {
            padding: 5px 8px;
            border: 2px solid #8B7355;
            border-radius: 4px;
            background: #E8DCC3;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-som {
            background: #8B7355;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 16px;
            cursor: pointer;
        }
        .moldura {
            background: #C12026;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin: 10px 0;
        }
        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 7px;
            background: #A81A1F;
            padding: 10px;
            border-radius: 6px;
            width: 310px;
            height: 310px;
        }
        .peca {
            background: #FFF176;
            border: 2px solid #8B7355;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #212121;
            cursor: pointer;
            user-select: none;
            transition: 0.15s;
        }
        .peca.vazia {
            background: #A81A1F;
            border: 2px dashed #8B161B;
            cursor: default;
        }
        .lista {
            background: #E8DCC3;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #8B7355;
            width: 310px;
            text-align: center;
            margin-bottom: 12px;
        }
        .lista h3 {
            font-size: 15px;
            color: #3A2E2B;
            margin-bottom: 6px;
        }
        .palavra {
            display: inline-block;
            margin: 3px 6px;
            font-size: 14px;
            color: #3A2E2B;
        }
        .palavra.ok { text-decoration: line-through; color: #6D4C41; }
        .botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
        }
        button {
            padding: 9px 16px;
            background: #9B1C1C;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .msg {
            font-size: 16px;
            font-weight: bold;
            color: #2E7D32;
            text-align: center;
            min-height: 22px;
            margin-bottom: 12px;
        }
        .anuncio {
            width: 310px;
            height: 58px;
            background: #D4C7A9;
            border: 2px solid #8B7355;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="cabecalho">
        <h1>✦ MINHA-VEZ VINTAGE ✦</h1>
        <div class="lado-direito">
            <select class="idioma" id="selIdioma" onchange="trocarIdioma()">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
                <option value="es">🇪🇸 ES</option>
            </select>
            <button class="btn-som" id="btnSom" onclick="ligarSom()">🔇</button>
        </div>
    </div>

    <div class="moldura">
        <div class="tabuleiro" id="tabuleiro"></div>
    </div>

    <div class="lista">
        <h3 id="tituloLista">Palavras para formar:</h3>
        <div id="palavras"></div>
    </div>

    <div class="botoes">
        <button id="btnEmbaralhar" onclick="embaralhar()">🔄 Embaralhar</button>
        <button id="btnVerificar" onclick="verificar()">✅ Verificar</button>
    </div>

    <div class="msg" id="mensagem"></div>

    <div class="anuncio" id="areaAnuncio" onclick="abrirAnuncio()">
        [ ESPAÇO DISPONÍVEL PARA ANÚNCIO ]
    </div>

    <script>
        // --------------------------
        // MÚSICA CRIADA DENTRO DO CÓDIGO — SEM DEPENDER DE NENHUM LINK!
        // --------------------------
        let audioCtx;
        let somLigado = false;
        let botaoSom = document.getElementById('btnSom');
        let nota = 0;
        let loopMusica;

        const sequencia = [262, 294, 330, 262, 330, 392, 294, 262, 330, 262, 220, 262, 294, 196, 262];

        function tocarNota(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const vol = audioCtx.createGain();
            osc.connect(vol);
            vol.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = freq;
            vol.gain.value = 0.12;
            osc.start();
            vol.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.35);
        }

        function iniciarMusica() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            loopMusica = setInterval(() => {
                tocarNota(sequencia[nota]);
                nota++;
                if (nota >= sequencia.length) nota = 0;
            }, 320);
        }

        function pararMusica() {
            clearInterval(loopMusica);
        }

        function ligarSom() {
            if (!somLigado) {
                iniciarMusica();
                botaoSom.textContent = "🔊";
                somLigado = true;
            } else {
                pararMusica();
                botaoSom.textContent = "🔇";
                somLigado = false;
            }
        }

        // --------------------------
        // LISTA COM PALAVRAS DE 4/5 LETRAS
        // --------------------------
        const LISTA_COMPLETA = {
            pt: {
                textos: {
                    titulo: "✦ MINHA-VEZ VINTAGE ✦",
                    lista: "Palavras para formar:",
                    embaralhar: "🔄 Embaralhar",
                    verificar: "✅ Verificar",
                    parabens: "🎉 PARABÉNS! Todas encontradas! Vem mais 4 novas!",
                    resultado: "Encontradas {0} de {1} palavras!",
                    anuncio: "[ ESPAÇO DISPONÍVEL PARA ANÚNCIO ]"
                },
                palavras: ["MATO","ATAR","CUCA","AMO","CASA","FLOR","BOLO","LUZ","MAR","CÉU","CHÃO","FRIO","QUENTE","ÁGUA","CAMPO","PLANTA","SOL","CHUVA","TERRA","VENTO","LIVRO","MESA","PORTA","RUA","CIDADE","ESTADO","PAÍS","MUNDO","PEIXE","PÁSSARO","GATO","CAVALO","FAZENDA","ESTRELA","LUAR","NUVEM","TRIGO","MILHO","CAFÉ","CANE","SOJA","FEIJÃO","ARROZ","FRUTA","VERDE","ESCOLA","AMIGO","IRMÃO","MÃE","PAI","FILHO","AVÓ","TIO","PRIMO","FAMÍLIA","TRABALHO","FÉRIAS","SONHO","FORÇA","PAZ","PEDRA","AREIA","RIO","LAGO","PONTE","CAMINHO","ESTRADA","TRILHA","BOLA","JOGO","BRINCO","CANTA","DANÇA","CONTA","AJUDA","BRANCO","PRETO","AZUL","VERMELHO","ROXO","MARROM","CINZA","LARANJA"]
            },
            en: {
                textos: {
                    titulo: "✦ MY TURN VINTAGE ✦",
                    lista: "Words to find:",
                    embaralhar: "🔄 Shuffle",
                    verificar: "✅ Check",
                    parabens: "🎉 CONGRATULATIONS! All found! 4 new ones coming!",
                    resultado: "Found {0} of {1} words!",
                    anuncio: "[ AD SPACE AVAILABLE ]"
                },
                palavras: ["TREE","BALL","HOME","LOVE","HOUSE","CAKE","LIGHT","SEA","SKY","COLD","HOT","WATER","WOOD","FIELD","PLANT","SEED","SUN","RAIN","EARTH","WIND","BOOK","TABLE","DOOR","STREET","CITY","STATE","WORLD","FISH","BIRD","DOG","CAT","HORSE","FARM","STAR","MOON","CLOUD","WHEAT","CORN","BEAN","RICE","FRUIT","GREEN","SCHOOL","FRIEND","MOTHER","FATHER","SON","UNCLE","COUSIN","FAMILY","WORK","DREAM","HOPE","PEACE","STONE","SAND","RIVER","LAKE","BRIDGE","PATH","ROAD","PLAY","GAME","SING","DANCE","READ","COUNT","DRAW","HELP","WHITE","BLACK","BLUE","RED","PURPLE","BROWN","GRAY","ORANGE"]
            },
            es: {
                textos: {
                    titulo: "✦ MI TURNO VINTAGE ✦",
                    lista: "Palabras a encontrar:",
                    embaralhar: "🔄 Mezclar",
                    verificar: "✅ Verificar",
                    parabens: "🎉 ¡FELICIDADES! ¡Todas encontradas! ¡Vienen 4 nuevas!",
                    resultado: "Encontradas {0} de {1} palabras!",
                    anuncio: "[ ESPACIO PARA ANUNCIO ]"
                },
                palavras: ["MATA","ATAR","CASA","AMOR","FLOR","PAN","LUZ","MAR","CIELO","FRÍO","CALOR","AGUA","ÁRBOL","CAMPO","PLANTA","SEMILLA","SOL","LLUVIA","TIERRA","VIENTO","LIBRO","MESA","PUERTA","CALLE","CIUDAD","ESTADO","PAÍS","MUNDO","PEZ","PÁJARO","PERRO","GATO","CABALLO","GRANJA","ESTRELLA","LUNA","NUBE","TRIGO","MAÍZ","CAFÉ","CAÑA","SOJA","FRIJOL","ARROZ","FRUTA","VERDE","BOSQUE","ESCUELA","AMIGO","HERMANO","MADRE","PADRE","HIJO","TÍO","PRIMO","FAMILIA","TRABAJO","SUEÑO","ESPERANZA","FUERZA","PAZ","PIEDRA","ARENA","RÍO","LAGO","PUENTE","CAMINO","CARRETERA","JUEGO","CANTA","BAILA","LEE","CUENTA","DIBUJA","AYUDA","BLANCO","NEGRO","AZUL","ROJO","MORADO","MARRÓN","GRIS","NARANJA"]
            }
        };

        // --------------------------
        // ANÚNCIO
        // --------------------------
        const DADOS_ANUNCIO = { texto: "ESPAÇO PARA SEU ANÚNCIO", link: "https://seulink.com.br" };
        document.getElementById('areaAnuncio').textContent = DADOS_ANUNCIO.texto;
        function abrirAnuncio() { if(DADOS_ANUNCIO.link) window.open(DADOS_ANUNCIO.link, '_blank'); }

        // --------------------------
        // VARIÁVEIS DO JOGO
        // --------------------------
        let idiomaAtual = "pt";
        let listaPalavras = [];
        let pecas = [];
        let espacoVazio = 15; // ESPAÇO VAZIO DE VOLTA PARA TROCAR PEÇAS!

        // --------------------------
        // PEGAR 4 NOVAS PALAVRAS
        // --------------------------
        function pegarNovasPalavras() {
            const todas = LISTA_COMPLETA[idiomaAtual].palavras;
            const embaralhado = [...todas].sort(() => Math.random() - 0.5);
            return embaralhado.slice(0,4);
        }

        // --------------------------
        // TROCAR IDIOMA
        // --------------------------
        function trocarIdioma() {
            idiomaAtual = document.getElementById('selIdioma').value;
            const txt = LISTA_COMPLETA[idiomaAtual].textos;
            document.querySelector('h1').textContent = txt.titulo;
            document.getElementById('tituloLista').textContent = txt.lista;
            document.getElementById('btnEmbaralhar').textContent = txt.embaralhar;
            document.getElementById('btnVerificar').textContent = txt.verificar;
            document.getElementById('areaAnuncio').textContent = txt.anuncio;
            iniciarJogo();
        }

        // --------------------------
        // INICIAR JOGO
        // --------------------------
        function iniciarJogo() {
            listaPalavras = pegarNovasPalavras();
            pecas = [];
            listaPalavras.forEach(p => pecas.push(...p.split('')));
            pecas.push(""); // ESPAÇO VAZIO OBRIGATÓRIO
            embaralhar();
            mostrarPalavras();
        }

        function mostrarPalavras() {
            const area = document.getElementById('palavras');
            area.innerHTML = "";
            listaPalavras.forEach(palavra => {
                const el = document.createElement('span');
                el.className = 'palavra';
                el.textContent = palavra;
                el.dataset.valor = palavra;
                area.appendChild(el);
            });
        }

        function embaralhar() {
            for (let i = pecas.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                if (pecas[i] !== "" && pecas[j] !== "") {
                    [pecas[i], pecas[j]] = [pecas[j], pecas[i]];
                }
            }
            espacoVazio = pecas.indexOf("");
            desenharTabuleiro();
            document.getElementById('mensagem').textContent = "";
            document.querySelectorAll('.palavra').forEach(p => p.classList.remove('ok'));
        }

        function desenharTabuleiro() {
            const tab = document.getElementById('tabuleiro');
            tab.innerHTML = "";
            pecas.forEach((letra, indice) => {
                const quadro = document.createElement('div');
                quadro.className = letra === "" ? "peca vazia" : "peca";
                quadro.textContent = letra;
                quadro.onclick = () => moverPeca(indice);
                tab.appendChild(quadro);
            });
        }

        function moverPeca(indiceClicado) {
            const vizinhos = [espacoVazio -1, espacoVazio +1, espacoVazio -4, espacoVazio +4];
            const valido = vizinhos.includes(indiceClicado);
            const mesmaLinha = Math.floor(indiceClicado/4) === Math.floor(espacoVazio/4);
            if ((vizinhos[0] === indiceClicado && !mesmaLinha) || (vizinhos[1] === indiceClicado && !mesmaLinha)) return;
            if(valido) {
                pecas[espacoVazio] = pecas[indiceClicado];
                pecas[indiceClicado] = "";
                espacoVazio = indiceClicado;
                desenharTabuleiro();
            }
        }

        function verificar() {
            const txt = LISTA_COMPLETA[idiomaAtual].textos;
            const formadas = [
                pecas[0]+pecas[1]+pecas[2]+pecas[3],
                pecas[4]+pecas[5]+pecas[6]+pecas[7],
                pecas[8]+pecas[9]+pecas[10]+pecas[11],
                pecas[12]+pecas[13]+pecas[14]+pecas[15]
            ];
            let acertou = 0;
            listaPalavras.forEach(palavra => {
                if(formadas.includes(palavra)) {
                    acertou++;
                    document.querySelector(`.palavra[data-valor="${palavra}"]`).classList.add('ok');
                }
            });

            if(acertou === listaPalavras.length) {
                document.getElementById('mensagem').textContent = txt.parabens;
                setTimeout(() => iniciarJogo(), 2500);
            } else {
                document.getElementById('mensagem').textContent = txt.resultado.replace("{0}", acertou).replace("{1}", listaPalavras.length);
            }
        }

        iniciarJogo();
    </script>
</body>
</html>
