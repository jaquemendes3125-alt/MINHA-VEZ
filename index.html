<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MINHA VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Arial Black", Gadget, sans-serif; }
        body {
            background-color: #F4EBD0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 15px 10px;
        }
        .cabecalho { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        h1 {
            font-size: 26px; color: #9B1C1C; text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .seletor-idioma {
            padding: 6px 10px; border: 2px solid #8B7355; border-radius: 4px;
            background-color: #E8DCC3; font-size: 14px; cursor: pointer;
        }
        .botao-musica {
            background-color: #8B7355; color: white; border: none; border-radius: 50%;
            width: 40px; height: 40px; font-size: 18px; cursor: pointer; margin-bottom: 15px;
        }
        .moldura {
            background-color: #C12026; padding: 18px; border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); margin-bottom: 15px;
        }
        .tabuleiro {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 8px; background-color: #A81A1F; padding: 10px; border-radius: 6px;
            width: 320px; height: 320px;
        }
        .peca {
            background-color: #FFF176; border: 2px solid #8B7355; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; color: #212121; cursor: pointer;
            user-select: none; transition: all 0.15s ease;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.15), inset 2px 2px 4px rgba(255,255,255,0.3);
        }
        .peca.vazia { background-color: #A81A1F; border: 2px dashed #8B161B; cursor: default; box-shadow: none; }
        .lista-palavras {
            background-color: #E8DCC3; padding: 12px; border-radius: 6px;
            border: 2px solid #8B7355; width: 320px; text-align: center; margin-bottom: 15px;
        }
        .lista-palavras h3 { color: #3A2E2B; margin-bottom: 8px; font-size: 16px; }
        .palavra { display: inline-block; margin: 4px 8px; font-size: 15px; color: #3A2E2B; }
        .palavra.encontrada { text-decoration: line-through; color: #6D4C41; }
        .botoes { display: flex; gap: 10px; margin-bottom: 15px; }
        button {
            padding: 10px 18px; background-color: #9B1C1C; color: white; border: none;
            border-radius: 4px; font-size: 15px; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        .mensagem { font-size: 17px; font-weight: bold; color: #2E7D32; text-align: center; margin-bottom: 15px; min-height: 24px; }
        .anuncio {
            width: 320px; height: 60px; background-color: #D4C7A9; border: 2px solid #8B7355;
            border-radius: 3px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px; text-align: center; padding: 5px; margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="cabecalho">
        <h1>✦ MINHA VEZ VINTAGE ✦</h1>
        <select class="seletor-idioma" id="idioma" onchange="mudarIdioma()">
            <option value="pt">🇧🇷 PT</option>
            <option value="en">🇺🇸 EN</option>
            <option value="es">🇪🇸 ES</option>
        </select>
    </div>

    <button class="botao-musica" id="btnMusica" onclick="alternarMusica()">🔇</button>

    <div class="moldura">
        <div class="tabuleiro" id="tabuleiro"></div>
    </div>

    <div class="lista-palavras">
        <h3 id="titulo-lista">Palavras para formar:</h3>
        <div id="palavras-alvo"></div>
    </div>

    <div class="botoes">
        <button id="btnEmbaralhar" onclick="embaralhar()">🔄 Embaralhar</button>
        <button id="btnVerificar" onclick="verificar()">✅ Verificar</button>
    </div>

    <div class="mensagem" id="mensagem"></div>

    <div class="anuncio" id="anuncio" onclick="abrirAnuncio()">
        [ ESPAÇO DISPONÍVEL PARA ANÚNCIO ]
    </div>

    <!-- MÚSICA 100% LIVRE DE DIREITOS AUTORAIS -->
    <audio id="musicaFundo" loop preload="metadata">
        <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_35b51a64c0.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    

    <script>
        // --------------------------
        // DAS TRADUÇÕES - VOCÊ PODE ALTERAR AQUI SE QUISER
        // --------------------------
        const TRADUCOES = {
            pt: {
                titulo: "✦ MINHA VEZ VINTAGE ✦",
                listaPalavras: "Palavras para formar:",
                embaralhar: "🔄 Embaralhar",
                verificar: "✅ Verificar",
                parabens: "🎉 PARABÉNS! Todas formadas!",
                acertou: "Acertou {0} de {1}!",
                anuncio: "[ ESPAÇO DISPONÍVEL PARA ANÚNCIO ]",
                palavras: ["MATO", "ATAR", "CUCA", "AMO"]
            },
            en: {
                titulo: "✦ MY TURN VINTAGE ✦",
                listaPalavras: "Words to form:",
                embaralhar: "🔄 Shuffle",
                verificar: "✅ Check",
                parabens: "🎉 CONGRATULATIONS! All found!",
                acertou: "Found {0} of {1}!",
                anuncio: "[ AD SPACE AVAILABLE ]",
                palavras: ["TREE", "BALL", "HOME", "LOVE"]
            },
            es: {
                titulo: "✦ MI TURNO VINTAGE ✦",
                listaPalavras: "Palabras para formar:",
                embaralhar: "🔄 Mezclar",
                verificar: "✅ Verificar",
                parabens: "🎉 ¡FELICIDADES! ¡Todas formadas!",
                acertou: "Encontraste {0} de {1}!",
                anuncio: "[ ESPACIO PARA ANUNCIO ]",
                palavras: ["MATA", "ATAR", "CASA", "AMOR"]
            }
        };

        // --------------------------
        // ANÚNCIO
        // --------------------------
        const ANUNCIO = { texto: "ESPAÇO PARA SEU ANÚNCIO", link: "https://seulink.com.br" };
        function abrirAnuncio() { if(ANUNCIO.link) window.open(ANUNCIO.link, '_blank'); }

        // --------------------------
        // CONTROLE DA MÚSICA
        // --------------------------
        const musica = document.getElementById('musicaFundo');
        const btnMusica = document.getElementById('btnMusica');
        let musicaLigada = false;
        function alternarMusica() {
            if (!musicaLigada) {
                musica.play().then(() => { btnMusica.textContent = "🔊"; musicaLigada = true; }).catch(() => alert("Clique novamente para ligar!"));
            } else { musica.pause(); btnMusica.textContent = "🔇"; musicaLigada = false; }
        }

        // --------------------------
        // VARIÁVEIS DO JOGO
        // --------------------------
        let idiomaAtual = "pt";
        let PALAVRAS_ALVO = TRADUCOES.pt.palavras;
        let pecas = [];
        let indiceVazio = 15;

        // --------------------------
        // TROCAR IDIOMA
        // --------------------------
        function mudarIdioma() {
            idiomaAtual = document.getElementById('idioma').value;
            const t = TRADUCOES[idiomaAtual];
            document.querySelector('h1').textContent = t.titulo;
            document.getElementById('titulo-lista').textContent = t.listaPalavras;
            document.getElementById('btnEmbaralhar').textContent = t.embaralhar;
            document.getElementById('btnVerificar').textContent = t.verificar;
            document.getElementById('anuncio').textContent = t.anuncio;
            PALAVRAS_ALVO = t.palavras;
            iniciar();
        }

        // --------------------------
        // INICIAR JOGO
        // --------------------------
        function iniciar() {
            pecas = ["M","A","T","O","A","T","A","R","C","U","C","A","A","M","O",""];
            embaralhar();
            mostrarPalavras();
        }

        function mostrarPalavras() {
            const lista = document.getElementById('palavras-alvo');
            lista.innerHTML = "";
            PALAVRAS_ALVO.forEach(p => {
                const el = document.createElement('span');
                el.className = 'palavra';
                el.textContent = p;
                el.dataset.valor = p;
                lista.appendChild(el);
            });
        }

        function embaralhar() {
            for (let i = pecas.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                if (pecas[i] !== "" && pecas[j] !== "") {
                    [pecas[i], pecas[j]] = [pecas[j], pecas[i]];
                    if (i === indiceVazio) indiceVazio = j;
                    else if (j === indiceVazio) indiceVazio = i;
                }
            }
            renderizarTabuleiro();
            document.getElementById('mensagem').textContent = "";
            document.querySelectorAll('.palavra').forEach(p => p.classList.remove('encontrada'));
        }

        function renderizarTabuleiro() {
            const tab = document.getElementById('tabuleiro');
            tab.innerHTML = "";
            pecas.forEach((letra, indice) => {
                const div = document.createElement('div');
                div.className = letra === "" ? "peca vazia" : "peca";
                div.textContent = letra;
                div.dataset.indice = indice;
                if (letra !== "") div.addEventListener('click', () => moverPeca(indice));
                tab.appendChild(div);
            });
        }

        function moverPeca(indiceClicado) {
            const vizinhos = [indiceVazio - 1, indiceVazio + 1, indiceVazio - 4, indiceVazio + 4];
            const valido = vizinhos.includes(indiceClicado);
            const mesmaLinha = Math.floor(indiceClicado / 4) === Math.floor(indiceVazio / 4);
            if ((vizinhos[0] === indiceClicado && !mesmaLinha) || (vizinhos[1] === indiceClicado && !mesmaLinha)) return;
            if (valido) {
                pecas[indiceVazio] = pecas[indiceClicado];
                pecas[indiceClicado] = "";
                indiceVazio = indiceClicado;
                renderizarTabuleiro();
            }
        }

        function verificar() {
            const t = TRADUCOES[idiomaAtual];
            const formadas = [
                pecas[0]+pecas[1]+pecas[2]+pecas[3],
                pecas[4]+pecas[5]+pecas[6]+pecas[7],
                pecas[8]+pecas[9]+pecas[10]+pecas[11],
                pecas[12]+pecas[13]+pecas[14]+pecas[15]
            ];
            let acertou = 0;
            PALAVRAS_ALVO.forEach(palavra => {
                if (formadas.includes(palavra)) {
                    acertou++;
                    document.querySelector(`.palavra[data-valor="${palavra}"]`).classList.add('encontrada');
                }
            });
            document.getElementById('mensagem').textContent = acertou === PALAVRAS_ALVO.length 
                ? t.parabens 
                : t.acertou.replace("{0}", acertou).replace("{1}", PALAVRAS_ALVO.length);
        }

        iniciar();
    </script>
</body>
</html>
