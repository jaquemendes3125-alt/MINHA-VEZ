<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINHA-VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #F4EBD0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #9B1C1C; margin-bottom: 15px; font-size: 26px; text-align: center; }
        .botoes-topo { display: flex; gap: 15px; margin-bottom: 15px; }
        select, button { padding: 8px 12px; font-size: 15px; border-radius: 4px; border: 2px solid #8B7355; cursor: pointer; }
        button { background: #9B1C1C; color: white; border: none; }
        .tabuleiro { display: grid; grid-template-columns: repeat(4, 70px); grid-template-rows: repeat(4, 70px); gap: 8px; background: #A81A1F; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .peca { background: #FFF176; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; border-radius: 4px; cursor: pointer; user-select: none; }
        .peca.vazia { background: #A81A1F; border: 2px dashed #8B161B; cursor: default; }
        .lista { background: #E8DCC3; padding: 15px; border-radius: 4px; width: 330px; text-align: center; margin-bottom: 15px; }
        .lista h3 { font-size: 17px; margin-bottom: 10px; }
        .palavra { margin: 5px 10px; font-size: 18px; display: inline-block; }
        .palavra.ok { text-decoration: line-through; color: #2E7D32; font-weight: bold; }
        .botoes-acoes { display: flex; gap: 15px; margin-bottom: 10px; }
        .mensagem { font-size: 19px; font-weight: bold; color: #2E7D32; margin: 10px 0; min-height: 25px; }
        .anuncio { width: 330px; height: 60px; background: #D4C7A9; border: 2px solid #8B7355; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>MINHA-VEZ VINTAGE</h1>

    <div class="botoes-topo">
        <select id="idioma" onchange="mudarIdioma()">
            <option value="pt">PortuguГЄs</option>
            <option value="en">InglГЄs</option>
            <option value="es">Espanhol</option>
        </select>
        <button id="botaoSom" onclick="ligarSom()">рџ”‡ Som</button>
    </div>

    <div class="tabuleiro" id="tabuleiro"></div>

    <div class="lista">
        <h3>Palavras para formar:</h3>
        <div id="palavrasLista"></div>
    </div>

    <div class="botoes-acoes">
        <button onclick="embaralharErenovar()">рџ”„ Embaralhar e Novas Palavras</button>
        <button onclick="verificar()">вњ… Verificar</button>
    </div>

    <div class="mensagem" id="mensagem"></div>

    <div class="anuncio">
        [ ESPAГ‡O PARA ANГљNCIO ]
    </div>

    <script>
        let somAtivo = false;
        let audioContexto;
        let espacoVazio = 15;
        let pecas = [];
        let palavrasRodada = [];
        let idiomaAtual = "pt";
        const TOTAL_CASAS = 16;

        const BANCO_PALAVRAS = {
            pt: {
                resultado: "Encontradas {0} de 3 palavras!",
                lista: ["CASA", "FLOR", "BOLO", "LUZ", "MAR", "CГ‰U", "CHГѓO", "FRIO", "ГЃGUA", "SOL", "LUA", "RIO", "PAZ", "MГѓE", "PAI", "VIDA", "DIA", "NOITE", "AZUL", "ROSA", "JOGO", "LIVRO", "MESA", "PORTA", "RUA", "GATO", "CГѓO", "PEIXE", "SIM", "NГѓO", "BOM", "RUIM", "VERDE", "FESTA"]
            },
            en: {
                resultado: "Found {0} of 3 words!",
                lista: ["TREE", "BALL", "HOME", "LOVE", "CAKE", "SEA", "SKY", "COLD", "HOT", "SUN", "MOON", "ROAD", "PEACE", "MOM", "DAD", "LIFE", "DAY", "NIGHT", "BLUE", "ROSE", "GAME", "BOOK", "TABLE", "DOOR", "CITY", "CAT", "DOG", "FISH", "YES", "NO", "NEW", "OLD", "BIG", "RED"]
            },
            es: {
                resultado: "Encontradas {0} de 3 palabras!",
                lista: ["CASA", "FLOR", "PAN", "LUZ", "MAR", "CIELO", "FRГЌO", "CALOR", "AGUA", "SOL", "LUNA", "RГЌO", "PAZ", "MAMГЃ", "PAPГЃ", "VIDA", "DГЌA", "NOCHE", "AZUL", "ROSA", "JUEGO", "LIBRO", "MESA", "PUERTA", "CIUDAD", "GATO", "PERRO", "PEZ", "SГЌ", "NO", "YA", "MAS", "PERO", "POR"]
            }
        };

        function tocarSom() {
            if(!audioContexto) audioContexto = new (window.AudioContext || window.webkitAudioContext)();
            const nota = audioContexto.createOscillator();
            const volume = audioContexto.createGain();
            nota.connect(volume);
            volume.connect(audioContexto.destination);
            nota.frequency.value = 520;
            nota.type = "square";
            volume.gain.value = 0.1;
            nota.start();
            nota.stop(audioContexto.currentTime + 0.15);
        }

        function ligarSom() {
            somAtivo = !somAtivo;
            document.getElementById("botaoSom").textContent = somAtivo ? "рџ”Љ Som" : "рџ”‡ Som";
        }

        function mudarIdioma() {
            idiomaAtual = document.getElementById("idioma").value;
            embaralharErenovar();
        }

        function pegarPalavrasNovas() {
            const todas = [...BANCO_PALAVRAS[idiomaAtual].lista];
            const selecionadas = [];
            for(let i=0; i<3; i++) {
                const indice = Math.floor(Math.random() * todas.length);
                selecionadas.push(todas.splice(indice, 1)[0]);
            }
            return selecionadas;
        }

        function embaralharPecas() {
            for(let i=pecas.length-1; i>0; i--) {
                const j = Math.floor(Math.random() * (i+1));
                if(pecas[i] !== "" && pecas[j] !== "") [pecas[i], pecas[j]] = [pecas[j], pecas[i]];
            }
            espacoVazio = pecas.indexOf("");
            desenharTabuleiro();
        }

        function desenharTabuleiro() {
            const tabuleiro = document.getElementById("tabuleiro");
            tabuleiro.innerHTML = "";
            pecas.forEach((letra, indice) => {
                const quadro = document.createElement("div");
                quadro.className = letra === "" ? "peca vazia" : "peca";
                quadro.textContent = letra;
                quadro.onclick = () => moverPeca(indice);
                tabuleiro.appendChild(quadro);
            });
        }

        function moverPeca(indice) {
            const vizinhos = [espacoVazio -1, espacoVazio +1, espacoVazio -4, espacoVazio +4];
            if(!vizinhos.includes(indice)) return;
            if(somAtivo) tocarSom();
            pecas[espacoVazio] = pecas[indice];
            pecas[indice] = "";
            espacoVazio = indice;
            desenharTabuleiro();
        }

        function mostrarPalavrasNaTela() {
            const lista = document.getElementById("palavrasLista");
            lista.innerHTML = "";
            palavrasRodada.forEach(p => {
                const item = document.createElement("span");
                item.className = "palavra";
                item.textContent = p;
                item.dataset.valor = p;
                lista.appendChild(item);
            });
        }

        // FUNГ‡ГѓO EXATA COMO VOCГЉ PEDIU:
        function embaralharErenovar() {
            // Pega 3 palavras NOVAS
            palavrasRodada = pegarPalavrasNovas();
            // Monta as letras das novas palavras + letras extras
            pecas = [];
            palavrasRodada.forEach(p => pecas.push(...p.split('')));
            const letrasExtras = "ABCDEFGHIJKLMNOPQRSTUVWXYZГЃГ‰ГЌГ“ГљГ‚ГЉГ”ГѓГ•Г‡";
            while(pecas.length < TOTAL_CASAS - 1) {
                pecas.push(letrasExtras[Math.floor(Math.random() * letrasExtras.length)]);
            }
            pecas.push("");
            // Embaralha tudo
            embaralharPecas();
            // Mostra as 3 palavras NOVAS
            mostrarPalavrasNaTela();
            // Limpa a mensagem
            document.getElementById("mensagem").textContent = "";
        }

        function verificar() {
            const linhas = [
                pecas[0]+pecas[1]+pecas[2]+pecas[3],
                pecas[4]+pecas[5]+pecas[6]+pecas[7],
                pecas[8]+pecas[9]+pecas[10]+pecas[11],
                pecas[12]+pecas[13]+pecas[14]+pecas[15]
            ];
            const colunas = [
                pecas[0]+pecas[4]+pecas[8]+pecas[12],
                pecas[1]+pecas[5]+pecas[9]+pecas[13],
                pecas[2]+pecas[6]+pecas[10]+pecas[14],
                pecas[3]+pecas[7]+pecas[11]+pecas[15]
            ];
            const todasOcorrencias = [
                ...linhas, ...colunas,
                ...linhas.map(l => l.split('').reverse().join('')),
                ...colunas.map(c => c.split('').reverse().join(''))
            ];

            let acertou = 0;
            palavrasRodada.forEach(palavra => {
                if(todasOcorrencias.includes(palavra)) {
                    acertou++;
                    document.querySelector(`[data-valor="${palavra}"]`).classList.add("ok");
                }
            });

            document.getElementById("mensagem").textContent = BANCO_PALAVRAS[idiomaAtual].resultado.replace("{0}", acertou);
        }

        // Inicia o primeiro jogo
        embaralharErenovar();
    </script>
</body>
</html>
