<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINHA-VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #F4EBD0;
            background-image: radial-gradient(#D4A373 8%, transparent 8%);
            background-position: 0 0;
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px;
            position: relative;
        }
        /* Estrelas decorativas nos cantos */
        body::before, body::after, .topo-esq, .topo-dir, .base-esq, .base-dir {
            content: "★";
            position: absolute;
            color: #9B1C1C;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        body::before { top: 15px; left: 15px; }
        body::after { top: 15px; right: 15px; }
        .base-esq { bottom: 15px; left: 15px; }
        .base-dir { bottom: 15px; right: 15px; }

        h1 {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            color: #9B1C1C;
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #D4A373;
            border-bottom: 3px double #8B7355;
            padding-bottom: 8px;
        }
        .controles-topo {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            background-color: rgba(255,241,118,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #8B7355;
        }
        select, button {
            font-family: 'Trebuchet MS', Helvetica, sans-serif;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 3px solid #6B3227;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        select {
            background-color: #FFF176;
            color: #6B3227;
        }
        button {
            background-color: #9B1C1C;
            color: #FFF176;
            border: none;
            box-shadow: 3px 3px 0px #6B3227;
        }
        button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0px #6B3227; }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #6B3227; }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(4, 75px);
            gap: 10px;
            background-color: #A81A1F;
            padding: 20px;
            border-radius: 12px;
            border: 5px solid #6B3227;
            box-shadow: 5px 5px 0px #8B7355, inset 0 0 15px rgba(0,0,0,0.2);
            margin: 20px 0;
        }
        .peca {
            background-color: #FFF176;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Impact', Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 36px;
            font-weight: normal;
            color: #6B3227;
            border-radius: 8px;
            border: 3px solid #8B7355;
            cursor: pointer;
            user-select: none;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.6), 2px 2px 3px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .peca:hover { transform: scale(1.03); }
        .peca.vazia {
            background-color: #A81A1F;
            border: 3px dashed #D4A373;
            cursor: default;
            box-shadow: none;
            transform: none;
        }

        .lista-palavras {
            background-color: #E8DCC3;
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #8B7355;
            width: 360px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 3px 3px 0px #6B3227;
            position: relative;
        }
        .lista-palavras::before, .lista-palavras::after {
            content: "✦";
            position: absolute;
            color: #9B1C1C;
            font-size: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        .lista-palavras::before { left: 15px; }
        .lista-palavras::after { right: 15px; }
        .lista-palavras h3 {
            font-family: 'Palatino Linotype', serif;
            font-size: 20px;
            margin-bottom: 15px;
            color: #6B3227;
            text-decoration: underline double;
        }
        .palavra {
            font-family: 'Comic Sans MS', cursive;
            margin: 8px 15px;
            font-size: 20px;
            display: inline-block;
            color: #6B3227;
            font-weight: bold;
        }
        .palavra.ok {
            text-decoration: line-through;
            color: #2E7D32;
            font-weight: bolder;
        }

        .botoes-acao {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .mensagem {
            font-family: 'Trebuchet MS', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #2E7D32;
            margin: 15px 0;
            min-height: 28px;
            text-align: center;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

        .area-anuncio {
            width: 360px;
            height: 70px;
            background-color: #D4C7A9;
            border: 4px solid #8B7355;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            font-size: 16px;
            color: #6B3227;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 3px 3px 0px #6B3227;
        }
    </style>
</head>
<body>
    <div class="base-esq"></div>
    <div class="base-dir"></div>

    <h1>✦ MINHA-VEZ VINTAGE ✦</h1>

    <div class="controles-topo">
        <select id="idiomaEscolhido" onchange="trocarIdioma()">
            <option value="pt">🇧🇷 Português</option>
            <option value="en">🇺🇸 Inglês</option>
            <option value="es">🇪🇸 Espanhol</option>
        </select>
        <button id="botaoSom" onclick="alternarSom()">🔇 Som</button>
    </div>

    <div class="tabuleiro" id="tabuleiroJogo"></div>

    <div class="lista-palavras">
        <h3>Palavras para formar:</h3>
        <div id="listaPalavrasJogo"></div>
    </div>

    <div class="botoes-acao">
        <button onclick="embaralharENovasPalavras()">🔄 Embaralhar & Novas Palavras</button>
        <button onclick="verificarPalavras()">✅ Verificar</button>
    </div>

    <div class="mensagem" id="aviso"></div>

    <div class="area-anuncio">
        ✦ ESPAÇO PARA ANÚNCIOS ✦
    </div>

    <script>
        let somAtivo = false;
        let audioContexto;
        let espacoVazio = 15;
        let pecasJogo = [];
        let palavrasRodada = [];
        let idiomaAtual = "pt";
        const TOTAL_CASAS = 16;

        const BANCO_PALAVRAS = {
            pt: {
                resultado: "Encontradas {0} de 3 palavras!",
                lista: ["CASA", "FLOR", "BOLO", "LUZ", "MAR", "CÉU", "CHÃO", "FRIO", "ÁGUA", "SOL", "LUA", "RIO", "PAZ", "MÃE", "PAI", "VIDA", "DIA", "NOITE", "AZUL", "ROSA", "JOGO", "LIVRO", "MESA", "PORTA", "RUA", "GATO", "CÃO", "PEIXE", "SIM", "NÃO", "BOM", "RUIM", "VERDE", "FESTA"]
            },
            en: {
                resultado: "Found {0} of 3 words!",
                lista: ["TREE", "BALL", "HOME", "LOVE", "CAKE", "SEA", "SKY", "COLD", "HOT", "SUN", "MOON", "ROAD", "PEACE", "MOM", "DAD", "LIFE", "DAY", "NIGHT", "BLUE", "ROSE", "GAME", "BOOK", "TABLE", "DOOR", "CITY", "CAT", "DOG", "FISH", "YES", "NO", "NEW", "OLD", "BIG", "RED"]
            },
            es: {
                resultado: "Encontradas {0} de 3 palabras!",
                lista: ["CASA", "FLOR", "PAN", "LUZ", "MAR", "CIELO", "FRÍO", "CALOR", "AGUA", "SOL", "LUNA", "RÍO", "PAZ", "MAMÁ", "PAPÁ", "VIDA", "DÍA", "NOCHE", "AZUL", "ROSA", "JUEGO", "LIBRO", "MESA", "PUERTA", "CIUDAD", "GATO", "PERRO", "PEZ", "SÍ", "NO", "YA", "MAS", "PERO", "POR"]
            }
        };

        function tocarSomMovimento() {
            if(!audioContexto) audioContexto = new (window.AudioContext || window.webkitAudioContext)();
            const nota = audioContexto.createOscillator();
            const volume = audioContexto.createGain();
            nota.connect(volume);
            volume.connect(audioContexto.destination);
            nota.frequency.value = 520;
            nota.type = "square";
            volume.gain.value = 0.1;
            nota.start();
            nota.stop(audioContexto.currentTime + 0.15);
        }

        function alternarSom() {
            somAtivo = !somAtivo;
            document.getElementById("botaoSom").textContent = somAtivo ? "🔊 Som" : "🔇 Som";
        }

        function trocarIdioma() {
            idiomaAtual = document.getElementById("idiomaEscolhido").value;
            embaralharENovasPalavras();
        }

        function sortearPalavrasNovas() {
            const todas = [...BANCO_PALAVRAS[idiomaAtual].lista];
            const selecionadas = [];
            for(let i=0; i<3; i++) {
                const indice = Math.floor(Math.random() * todas.length);
                selecionadas.push(todas.splice(indice, 1)[0]);
            }
            return selecionadas;
        }

        function embaralharPecas() {
            for(let i=pecasJogo.length-1; i>0; i--) {
                const j = Math.floor(Math.random() * (i+1));
                if(pecasJogo[i] !== "" && pecasJogo[j] !== "") [pecasJogo[i], pecasJogo[j]] = [pecasJogo[j], pecasJogo[i]];
            }
            espacoVazio = pecasJogo.indexOf("");
            desenharTabuleiro();
        }

        function desenharTabuleiro() {
            const tabuleiro = document.getElementById("tabuleiroJogo");
            tabuleiro.innerHTML = "";
            pecasJogo.forEach((letra, indice) => {
                const quadro = document.createElement("div");
                quadro.className = letra === "" ? "peca vazia" : "peca";
                quadro.textContent = letra;
                quadro.onclick = () => moverPeca(indice);
                tabuleiro.appendChild(quadro);
            });
        }

        function moverPeca(indice) {
            const vizinhos = [espacoVazio -1, espacoVazio +1, espacoVazio -4, espacoVazio +4];
            if(!vizinhos.includes(indice)) return;
            if(somAtivo) tocarSomMovimento();
            pecasJogo[espacoVazio] = pecasJogo[indice];
            pecasJogo[indice] = "";
            espacoVazio = indice;
            desenharTabuleiro();
        }

        function mostrarPalavrasNaTela() {
            const lista = document.getElementById("listaPalavrasJogo");
            lista.innerHTML = "";
            palavrasRodada.forEach(p => {
                const item = document.createElement("span");
                item.className = "palavra";
                item.textContent = p;
                item.dataset.valor = p;
                lista.appendChild(item);
            });
        }

        function embaralharENovasPalavras() {
            palavrasRodada = sortearPalavrasNovas();
            pecasJogo = [];
            palavrasRodada.forEach(p => pecasJogo.push(...p.split('')));
            const letrasExtras = "ABCDEFGHIJKLMNOPQRSTUVWXYZÁÉÍÓÚÂÊÔÃÕÇ";
            while(pecasJogo.length < TOTAL_CASAS - 1) {
                pecasJogo.push(letrasExtras[Math.floor(Math.random() * letrasExtras.length)]);
            }
            pecasJogo.push("");
            embaralharPecas();
            mostrarPalavrasNaTela();
            document.getElementById("aviso").textContent = "";
        }

        function verificarPalavras() {
            const linhas = [
                pecasJogo[0]+pecasJogo[1]+pecasJogo[2]+pecasJogo[3],
                pecasJogo[4]+pecasJogo[5]+pecasJogo[6]+pecasJogo[7],
                pecasJogo[8]+pecasJogo[9]+pecasJogo[10]+pecasJogo[11],
                pecasJogo[12]+pecasJogo[13]+pecasJogo[14]+pecasJogo[15]
            ];
            const colunas = [
                pecasJogo[0]+pecasJogo[4]+pecasJogo[8]+pecasJogo[12],
                pecasJogo[1]+pecasJogo[5]+pecasJogo[9]+pecasJogo[13],
                pecasJogo[2]+pecasJogo[6]+pecasJogo[10]+pecasJogo[14],
                pecasJogo[3]+pecasJogo[7]+pecasJogo[11]+pecasJogo[15]
            ];
            const todasFormadas = [
                ...linhas, ...colunas,
                ...linhas.map(l => l.split('').reverse().join('')),
                ...colunas.map(c => c.split('').reverse().join(''))
            ];

            let acertou = 0;
            palavrasRodada.forEach(palavra => {
                if(todasFormadas.includes(palavra)) {
                    acertou++;
                    document.querySelector(`[data-valor="${palavra}"]`).classList.add("ok");
                }
            });

            document.getElementById("aviso").textContent = BANCO_PALAVRAS[idiomaAtual].resultado.replace("{0}", acertou);
        }

        embaralharENovasPalavras();
    </script>
</body>
</html>
