<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINHA-VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #F4EBD0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #9B0000;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        h1::before { content: "✦ "; }
        h1::after { content: " ✦"; }

        .topo-controles {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 4px;
            border: 2px solid #660000;
            cursor: pointer;
            font-weight: bold;
        }
        select { background-color: #FFE97F; color: #660000; }
        button { background-color: #9B0000; color: #FFE97F; border: none; }

        /* AGORA 5 POR 5, TODAS AS OUTRAS CARACTERÍSTICAS IGUAIS */
        .tabuleiro {
            background-color: #C41E3A;
            border: 6px solid #8B0000;
            border-radius: 12px;
            padding: 18px 18px 24px 18px;
            box-shadow: none;
            display: grid;
            grid-template-columns: repeat(5, 62px);
            grid-template-rows: repeat(5, 62px);
            gap: 6px;
            margin-bottom: 20px;
        }

        .peca {
            background-color: #FFE97F;
            border: 3px solid #CC9900;
            border-radius: 6px;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            font-size: 30px;
            color: #000000;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
        }
        .peca.vazia {
            background-color: #C41E3A;
            border: none;
            cursor: default;
        }

        .lista-palavras {
            background-color: #E8DCC3;
            border: 3px solid #8B7355;
            border-radius: 8px;
            padding: 18px;
            width: 360px;
            text-align: center;
            margin-bottom: 18px;
            box-shadow: none;
        }
        .lista-palavras h3 {
            font-size: 18px;
            color: #660000;
            margin-bottom: 12px;
            font-weight: bold;
        }
        .palavra {
            font-size: 19px;
            font-weight: bold;
            color: #660000;
            margin: 0 10px;
            display: inline-block;
        }
        .palavra.ok {
            text-decoration: line-through;
            color: #006600;
        }

        .botoes {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }
        .mensagem {
            font-size: 20px;
            font-weight: bold;
            color: #006600;
            min-height: 26px;
            text-align: center;
            margin-bottom: 15px;
        }

        .anuncio {
            width: 360px;
            height: 65px;
            background-color: #D4C7A9;
            border: 3px solid #8B7355;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #660000;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>MINHA-VEZ VINTAGE</h1>

    <div class="topo-controles">
        <select id="idioma" onchange="trocarIdioma()">
            <option value="pt">Português</option>
            <option value="en">Inglês</option>
            <option value="es">Espanhol</option>
        </select>
        <button id="botaoSom" onclick="alternarSom()">🔇 Som</button>
    </div>

    <div class="tabuleiro" id="tabuleiroJogo"></div>

    <div class="lista-palavras">
        <h3>Palavras para formar:</h3>
        <div id="listaPalavras"></div>
    </div>

    <div class="botoes">
        <button onclick="embaralharENovas()">🔄 Embaralhar</button>
        <button onclick="verificar()">✅ Verificar</button>
    </div>

    <div class="mensagem" id="aviso"></div>

    <div class="anuncio">✦ ESPAÇO PARA ANÚNCIOS ✦</div>

    <script>
        let somAtivo = false;
        let audioContexto;
        let espacoVazio = 24;
        let pecas = [];
        let palavrasRodada = [];
        let idiomaAtual = "pt";
        let loopMusica;
        let notaMusica = 0;
        const TOTAL = 25;
        const melodia = [262, 294, 330, 262, 330, 392, 294, 262, 330, 262, 220, 262, 294, 196, 262];

        function iniciarAudio() {
            if(!audioContexto) audioContexto = new (window.AudioContext || window.webkitAudioContext)();
            if(audioContexto.state === 'suspended') audioContexto.resume();
        }

        function tocarNotaMusica(freq, duracao = 0.3) {
            if(!audioContexto || !somAtivo) return;
            const osc = audioContexto.createOscillator();
            const vol = audioContexto.createGain();
            osc.connect(vol); vol.connect(audioContexto.destination);
            osc.type = 'square'; osc.frequency.value = freq;
            vol.gain.value = 0.08; osc.start();
            vol.gain.exponentialRampToValueAtTime(0.01, audioContexto.currentTime + duracao);
            osc.stop(audioContexto.currentTime + duracao + 0.05);
        }

        function tocarSomMovimento() {
            if(!audioContexto || !somAtivo) return;
            const n = audioContexto.createOscillator();
            const v = audioContexto.createGain();
            n.connect(v); v.connect(audioContexto.destination);
            n.frequency.value = 520; n.type = "square"; v.gain.value = 0.12;
            n.start(); n.stop(audioContexto.currentTime + 0.15);
        }

        function ligarMusica() {
            iniciarAudio();
            pararMusica();
            loopMusica = setInterval(() => {
                tocarNotaMusica(melodia[notaMusica]);
                notaMusica++;
                if(notaMusica >= melodia.length) notaMusica = 0;
            }, 320);
        }

        function pararMusica() {
            clearInterval(loopMusica);
        }

        function alternarSom() {
            iniciarAudio();
            somAtivo = !somAtivo;
            document.getElementById("botaoSom").textContent = somAtivo ? "🔊 Som" : "🔇 Som";
            if(somAtivo) ligarMusica();
            else pararMusica();
        }

        function trocarIdioma() {
            idiomaAtual = document.getElementById("idioma").value;
            embaralharENovas();
        }

        const BANCO = {
            pt: { res: "Encontradas {0} de 3 palavras!", lista: ["CASA", "FLOR", "BOLO", "LUZ", "MAR", "CÉU", "CHÃO", "FRIO", "ÁGUA", "SOL", "LUA", "RIO", "PAZ", "MÃE", "PAI", "VIDA", "DIA", "NOITE", "AZUL", "ROSA", "JOGO", "LIVRO", "MESA", "PORTA", "RUA", "GATO", "CÃO", "PEIXE", "SIM", "NÃO", "BOM", "RUIM", "VERDE", "FESTA", "FRUTA", "PEDRA", "CAMPO", "TRIGO", "FEIJÃO", "MILHO", "ARROZ", "CANJA", "DOCE", "SALTO", "VALE"] },
            en: { res: "Found {0} of 3 words!", lista: ["TREE", "BALL", "HOME", "LOVE", "CAKE", "SEA", "SKY", "COLD", "HOT", "SUN", "MOON", "ROAD", "PEACE", "MOM", "DAD", "LIFE", "DAY", "NIGHT", "BLUE", "ROSE", "GAME", "BOOK", "TABLE", "DOOR", "CITY", "CAT", "DOG", "FISH", "YES", "NO", "NEW", "OLD", "BIG", "RED", "STONE", "FIELD", "WHEAT", "BEANS", "CORN", "RICE", "SUGAR", "SALT", "HILL", "LAKE"] },
            es: { res: "Encontradas {0} de 3 palabras!", lista: ["CASA", "FLOR", "PAN", "LUZ", "MAR", "CIELO", "FRÍO", "CALOR", "AGUA", "SOL", "LUNA", "RÍO", "PAZ", "MAMÁ", "PAPÁ", "VIDA", "DÍA", "NOCHE", "AZUL", "ROSA", "JUEGO", "LIBRO", "MESA", "PUERTA", "CIUDAD", "GATO", "PERRO", "PEZ", "SÍ", "NO", "YA", "MAS", "PERO", "POR", "FRUTA", "PIEDRA", "CAMPO", "TRIGO", "FRIJOL", "MAIZ", "ARROZ", "DULCE", "SAL", "MONTE", "VALLE"] }
        };

        function pegarPalavras() {
            let t = [...BANCO[idiomaAtual].lista], s = [];
            for(let i=0;i<3;i++) s.push(t.splice(Math.floor(Math.random()*t.length),1)[0]);
            return s;
        }

        function desenhar() {
            const tab = document.getElementById("tabuleiroJogo");
            tab.innerHTML = "";
            pecas.forEach((l,i)=>{
                const d = document.createElement("div");
                d.className = l==""?"peca vazia":"peca";
                d.textContent = l;
                d.onclick = ()=>mover(i);
                tab.appendChild(d);
            });
        }

        function mover(i) {
            const v = [espacoVazio-1, espacoVazio+1, espacoVazio-5, espacoVazio+5];
            if(!v.includes(i)) return;
            if(somAtivo) tocarSomMovimento();
            pecas[espacoVazio] = pecas[i]; pecas[i] = ""; espacoVazio = i;
            desenhar();
        }

        function mostrarPalavras() {
            const l = document.getElementById("listaPalavras"); l.innerHTML = "";
            palavrasRodada.forEach(p=>{
                const s = document.createElement("span");
                s.className = "palavra"; s.textContent = p; s.dataset.val = p;
                l.appendChild(s);
            });
        }

        function embaralharPecas() {
            for(let i=pecas.length-1;i>0;i--) {
                const j = Math.floor(Math.random()*(i+1));
                if(pecas[i]!="" && pecas[j]!="") [pecas[i], pecas[j]] = [pecas[j], pecas[i]];
            }
            espacoVazio = pecas.indexOf(""); desenhar();
        }

        function embaralharENovas() {
            palavrasRodada = pegarPalavras();
            pecas = []; palavrasRodada.forEach(p=>pecas.push(...p.split("")));
            const extras = "ABCDEFGHIJKLMNOPQRSTUVWXYZÁÉÍÓÚÂÊÔÃÕÇ";
            while(pecas.length < TOTAL-1) pecas.push(extras[Math.floor(Math.random()*extras.length)]);
            pecas.push(""); embaralharPecas(); mostrarPalavras();
            document.getElementById("aviso").textContent = "";
        }

        function verificar() {
            const lins = [];
            for(let i=0;i<5;i++) lins.push(pecas[i*5]+pecas[i*5+1]+pecas[i*5+2]+pecas[i*5+3]+pecas[i*5+4]);
            const cols = [];
            for(let i=0;i<5;i++) cols.push(pecas[i]+pecas[i+5]+pecas[i+10]+pecas[i+15]+pecas[i+20]);
            const todas = [...lins, ...cols, ...lins.map(x=>x.split("").reverse().join("")), ...cols.map(x=>x.split("").reverse().join(""))];
            let acertou = 0;
            palavrasRodada.forEach(p=>{
                if(todas.includes(p)) {
                    acertou++;
                    document.querySelector(`[data-val="${p}"]`).classList.add("ok");
                }
            });
            document.getElementById("aviso").textContent = BANCO[idiomaAtual].res.replace("{0}", acertou);
        }

        embaralharENovas();
    </script>

</body>
</html>
