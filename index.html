<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MINHA-VEZ VINTAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Arial Black", Gadget, sans-serif; }
        html, body {
            background-color: #F4EBD0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
        }
        h1 {
            font-size: 26px;
            color: #9B1C1C;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 12px;
        }
        .linha-opcoes {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .idioma {
            padding: 6px 10px;
            border: 2px solid #8B7355;
            border-radius: 4px;
            background: #E8DCC3;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-som {
            background: #8B7355;
            color: white;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
        }
        .moldura {
            background: #C12026;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin: 10px 0;
        }
        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            background: #A81A1F;
            padding: 12px;
            border-radius: 6px;
            width: 360px;
            height: 360px;
        }
        .peca {
            background: #FFF176;
            border: 2px solid #8B7355;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: bold;
            color: #212121;
            cursor: pointer;
            user-select: none;
        }
        .peca.vazia {
            background: #A81A1F;
            border: 2px dashed #8B161B;
            cursor: default;
        }
        .lista {
            background: #E8DCC3;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #8B7355;
            width: 360px;
            text-align: center;
            margin-bottom: 12px;
        }
        .lista h3 {
            font-size: 16px;
            color: #3A2E2B;
            margin-bottom: 8px;
        }
        .palavra {
            display: inline-block;
            margin: 4px 8px;
            font-size: 15px;
            color: #3A2E2B;
        }
        .palavra.ok { text-decoration: line-through; color: #6D4C41; }
        .botoes {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 12px;
        }
        button {
            padding: 10px 20px;
            background: #9B1C1C;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }
        .msg {
            font-size: 17px;
            font-weight: bold;
            color: #2E7D32;
            text-align: center;
            min-height: 24px;
            margin-bottom: 12px;
        }
        .anuncio {
            width: 360px;
            height: 60px;
            background: #D4C7A9;
            border: 2px solid #8B7355;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>✦ MINHA-VEZ VINTAGE ✦</h1>

    <div class="linha-opcoes">
        <select class="idioma" id="selIdioma" onchange="trocarIdioma()">
            <option value="pt">🇧🇷 PT</option>
            <option value="en">🇺🇸 EN</option>
            <option value="es">🇪🇸 ES</option>
        </select>
        <button class="btn-som" id="btnSom" onclick="ligarSom()">🔇</button>
    </div>

    <div class="moldura">
        <div class="tabuleiro" id="tabuleiro"></div>
    </div>

    <div class="lista">
        <h3 id="tituloLista">Palavras para formar:</h3>
        <div id="palavras"></div>
    </div>

    <div class="botoes">
        <button id="btnEmbaralhar" onclick="embaralhar()">🔄 Embaralhar</button>
        <button id="btnVerificar" onclick="verificar()">✅ Verificar</button>
    </div>

    <div class="msg" id="mensagem"></div>

    <div class="anuncio" id="areaAnuncio" onclick="abrirAnuncio()">
        [ ESPAÇO DISPONÍVEL PARA ANÚNCIO ]
    </div>

    <script>
        // SONS
        let audioCtx;
        let somLigado = false;
        let nota = 0;
        let loopMusica;
        const sequencia = [262, 294, 330, 262, 330, 392, 294, 262, 330, 262, 220, 262, 294, 196, 262];

        function tocarNota(freq, duracao = 0.3) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const vol = audioCtx.createGain();
            osc.connect(vol);
            vol.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = freq;
            vol.gain.value = 0.12;
            osc.start();
            vol.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duracao);
            osc.stop(audioCtx.currentTime + duracao + 0.05);
        }

        function iniciarMusica() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            loopMusica = setInterval(() => {
                tocarNota(sequencia[nota]);
                nota++;
                if (nota >= sequencia.length) nota = 0;
            }, 320);
        }

        function pararMusica() { clearInterval(loopMusica); }
        function ligarSom() {
            if (!somLigado) { iniciarMusica(); document.getElementById('btnSom').textContent = "🔊"; somLigado = true; }
            else { pararMusica(); document.getElementById('btnSom').textContent = "🔇"; somLigado = false; }
        }
        function somMoverPeca() { tocarNota(520, 0.1); }

        // TODAS COM EXATAMENTE 4 LETRAS E SENTIDO REAL - 100 POR IDIOMA
        const LISTA_COMPLETA = {
            pt: {
                textos: {
                    titulo: "✦ MINHA-VEZ VINTAGE ✦",
                    lista: "Palavras para formar:",
                    embaralhar: "🔄 Embaralhar",
                    verificar: "✅ Verificar",
                    parabens: "🎉 PARABÉNS! Todas encontradas! Vem mais 3 novas!",
                    resultado: "Encontradas {0} de {1} palavras!",
                    anuncio: "[ ESPAÇO DISPONÍVEL PARA ANÚNCIO ]"
                },
                palavras: [
                    "CASA", "FLOR", "BOLO", "LUZ", "MAR", "CÉU", "CHÃO", "FRIO", "ÁGUA", "SOL",
                    "LUA", "RIO", "PAZ", "MÃE", "PAI", "FILH", "AVÓ", "AMOR", "VIDA", "DIA",
                    "NOIT", "VERD", "AZUL", "ROSA", "CANO", "FEST", "JOGO", "LIVR", "MESA", "PORT",
                    "RUA", "CIDA", "PAÍS", "MUND", "GATO", "CÃO", "PEIX", "FRUT", "TRIG", "MILH",
                    "FEIJ", "ARRO", "FAMÍ", "AMIG", "SONH", "FORÇ", "PEDR", "AREI", "PONT", "CAMI",
                    "BOLA", "BRIN", "DANÇ", "CANTA", "AJUD", "BRAN", "PRET", "VERM", "CINZ", "ROXO",
                    "VERD", "QUEN", "ONDE", "QUEM", "COIS", "MUIT", "POUC", "TOD", "NENH", "ALGÚ",
                    "SEMP", "NUNC", "AGOR", "DEPO", "ANT", "HOJE", "AMAN", "ONT", "ANO", "MÊS",
                    "SEMA", "DIA", "HORA", "MINU", "SEGU", "NOVO", "VELH", "BOM", "RUIM", "GRAN",
                    "PEQU", "ALTO", "BAIX", "LONGE", "PERTO", "DENT", "FORA", "CIMA", "BAIXO", "ESQU",
                    "DIRE", "LEVE", "PESO", "FRAC", "FORTE", "RÁPI", "DEGA", "BONI", "FEIO", "LINDO"
                ]
            },
            en: {
                textos: {
                    titulo: "✦ MY TURN VINTAGE ✦",
                    lista: "Words to find:",
                    embaralhar: "🔄 Shuffle",
                    verificar: "✅ Check",
                    parabens: "🎉 CONGRATULATIONS! All found! 3 new ones coming!",
                    resultado: "Found {0} of {1} words!",
                    anuncio: "[ AD SPACE AVAILABLE ]"
                },
                palavras: [
                    "TREE", "BALL", "HOME", "LOVE", "HOUS", "CAKE", "LAMP", "SEA", "SKY", "COLD",
                    "HOT", "WATER", "WOOD", "FIELD", "SUN", "MOON", "RIVER", "PEACE", "MOM", "DAD",
                    "SON", "LIFE", "DAY", "NIGHT", "GREEN", "BLUE", "ROSE", "SONG", "PARTY", "GAME",
                    "BOOK", "TABLE", "DOOR", "CITY", "LAND", "WORLD", "CAT", "DOG", "FISH", "FOOD",
                    "WHEAT", "CORN", "BEAN", "RICE", "FARM", "FRIEND", "DREAM", "HOPE", "STONE", "SAND",
                    "BRIDGE", "PATH", "PLAY", "SING", "DANCE", "HELP", "WHITE", "BLACK", "RED", "GRAY",
                    "PINK", "GOLD", "SILV", "IRON", "WOOD", "GLAS", "PAPE", "CLOT", "FOOT", "HAND",
                    "HEAD", "EYE", "NOSE", "MOUT", "EAR", "FACE", "BACK", "CHES", "ARMS", "LEGS",
                    "TOWN", "ROAD", "STRE", "HOUR", "MINU", "SECO", "YEAR", "MON", "WEEK", "DATE",
                    "NEW", "OLD", "GOOD", "BAD", "BIG", "SMAL", "TALL", "SHOR", "FAST", "SLOW"
                ]
            },
            es: {
                textos: {
                    titulo: "✦ MI TURNO VINTAGE ✦",
                    lista: "Palabras a encontrar:",
                    embaralhar: "🔄 Mezclar",
                    verificar: "✅ Verificar",
                    parabens: "🎉 ¡FELICIDADES! ¡Todas encontradas! ¡Vienen 3 nuevas!",
                    resultado: "Encontradas {0} de {1} palabras!",
                    anuncio: "[ ESPACIO PARA ANUNCIO ]"
                },
                palavras: [
                    "CASA", "FLOR", "PAN", "LUZ", "MAR", "CIEL", "FRÍO", "CALO", "AGUA", "ÁRBOL",
                    "CAMPO", "SOL", "LUNA", "RÍO", "PAZ", "MAMÁ", "PAPÁ", "HIJO", "VIDA", "DÍA",
                    "NOCH", "VERD", "AZUL", "ROSA", "CANC", "FIES", "JUEG", "LIBR", "MESA", "PUER",
                    "CIUD", "PAÍS", "MUND", "GATO", "PERRO", "PEZ", "FRUT", "TRIG", "MAÍZ", "FRIJ",
                    "ARRÓ", "FINC", "AMIG", "SUEÑ", "ESPE", "PIED", "AREN", "PUEN", "CAMI", "CANTA",
                    "BAIL", "AYUD", "BLAN", "NEGR", "ROJO", "GRIS", "ROSA", "ORO", "PLATA", "HIER",
                    "VIDR", "PAPE", "TELA", "PIE", "MANO", "CABEZ", "OJO", "NARIZ", "BOCA", "OREJ",
                    "CAR", "ESPAL", "PECH", "BRAZ", "PIERN", "PUEB", "CAMIN", "CALLE", "HORA", "MINU",
                    "SEGU", "AÑO", "MES", "SEMA", "FECH", "NUEV", "VIEJ", "BUEN", "MAL", "GRAN",
                    "PEQU", "ALTO", "BAJO", "RÁPI", "LENT", "BONI", "FEA", "FUER", "DEBIL"
                ]
            }
        };

        const DADOS_ANUNCIO = { texto: "ESPAÇO PARA SEU ANÚNCIO", link: "https://seulink.com.br" };
        document.getElementById('areaAnuncio').textContent = DADOS_ANUNCIO.texto;
        function abrirAnuncio() { if(DADOS_ANUNCIO.link) window.open(DADOS_ANUNCIO.link, '_blank'); }

        let idiomaAtual = "pt";
        let listaPalavras = [];
        let pecas = [];
        let espacoVazio = 15;

        function pegarNovasPalavras() {
            const todas = LISTA_COMPLETA[idiomaAtual].palavras;
            const embaralhado = [...todas].sort(() => Math.random() - 0.5);
            return embaralhado.slice(0,3);
        }

        function trocarIdioma() {
            idiomaAtual = document.getElementById('selIdioma').value;
            const txt = LISTA_COMPLETA[idiomaAtual].textos;
            document.querySelector('h1').textContent = txt.titulo;
            document.getElementById('tituloLista').textContent = txt.lista;
            document.getElementById('btnEmbaralhar').textContent = txt.embaralhar;
            document.getElementById('btnVerificar').textContent = txt.verificar;
            document.getElementById('areaAnuncio').textContent = txt.anuncio;
            iniciarJogo();
        }

        function iniciarJogo() {
            listaPalavras = pegarNovasPalavras();
            pecas = [];
            listaPalavras.forEach(p => pecas.push(...p.trim().split('')));
            pecas.push("");
            embaralhar();
            mostrarPalavras();
        }

        function mostrarPalavras() {
            const area = document.getElementById('palavras');
            area.innerHTML = "";
            listaPalavras.forEach(palavra => {
                const el = document.createElement('span');
                el.className = 'palavra';
                el.textContent = palavra.trim();
                el.dataset.valor = palavra.trim();
                area.appendChild(el);
            });
        }

        function embaralhar() {
            for (let i = pecas.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                if (pecas[i] !== "" && pecas[j] !== "") {
                    [pecas[i], pecas[j]] = [pecas[j], pecas[i]];
                }
            }
            espacoVazio = pecas.indexOf("");
            desenharTabuleiro();
            document.getElementById('mensagem').textContent = "";
            document.querySelectorAll('.palavra').forEach(p => p.classList.remove('ok'));
        }

        function desenharTabuleiro() {
            const tab = document.getElementById('tabuleiro');
            tab.innerHTML = "";
            pecas.forEach((letra, indice) => {
                const quadro = document.createElement('div');
                quadro.className = letra === "" ? "peca vazia" : "peca";
                quadro.textContent = letra;
                quadro.onclick = () => moverPeca(indice);
                tab.appendChild(quadro);
            });
        }

        function moverPeca(indiceClicado) {
            const vizinhos = [espacoVazio -1, espacoVazio +1, espacoVazio -4, espacoVazio +4];
            const valido = vizinhos.includes(indiceClicado);
            const mesmaLinha = Math.floor(indiceClicado/4) === Math.floor(espacoVazio/4);
            if ((vizinhos[0] === indiceClicado && !mesmaLinha) || (vizinhos[1] === indiceClicado && !mesmaLinha)) return;
            if(valido) {
                somMoverPeca();
                pecas[espacoVazio] = pecas[indiceClicado];
                pecas[indiceClicado] = "";
                espacoVazio = indiceClicado;
                desenharTabuleiro();
            }
        }

        function verificar() {
            const txt = LISTA_COMPLETA[idiomaAtual].textos;
            const linhas = [
                pecas[0]+pecas[1]+pecas[2]+pecas[3],
                pecas[4]+pecas[5]+pecas[6]+pecas[7],
                pecas[8]+pecas[9]+pecas[10]+pecas[11],
                pecas[12]+pecas[13]+pecas[14]+pecas[15]
            ];
            const colunas = [
                pecas[0]+pecas[4]+pecas[8]+pecas[12],
                pecas[1]+pecas[5]+pecas[9]+pecas[13],
                pecas[2]+pecas[6]+pecas[10]+pecas[14],
                pecas[3]+pecas[7]+pecas[11]+pecas[15]
            ];
            const todasFormadas = [...linhas, ...colunas, ...linhas.map(p => p.split('').reverse().join('')), ...colunas.map(p => p.split('').reverse().join(''))];

            let acertou = 0;
            listaPalavras.forEach(palavra => {
                const limpa = palavra.trim();
                if(todasFormadas.includes(limpa)) {
                    acertou++;
                    document.querySelector(`.palavra[data-valor="${limpa}"]`).classList.add('ok');
                }
            });

            if(acertou === listaPalavras.length) {
                document.getElementById('mensagem').textContent = txt.parabens;
                setTimeout(() => iniciarJogo(), 2500);
            } else {
                document.getElementById('mensagem').textContent = txt.resultado.replace("{0}", acertou).replace("{1}", listaPalavras.length);
            }
        }

        iniciarJogo();
    </script>
</body>
</html>
